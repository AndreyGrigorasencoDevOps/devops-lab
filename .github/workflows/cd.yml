name: CD
run-name: CD | env=${{ inputs.environment }} | tf=${{ inputs.action }} | image=${{ inputs.image_tag || 'n/a' }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Terraform action"
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy
      image_tag:
        description: "Immutable image tag from CI (example: sha-abc1234). Required for plan/apply."
        required: false
        type: string
      bootstrap_mode:
        description: "Opt-in first-apply bootstrap for Terraform-managed env prerequisites. Still requires the shared runner path and the manual <env>-db-password secret."
        required: false
        type: boolean
        default: false

concurrency:
  group: platform-control-plane
  cancel-in-progress: false

env:
  IMAGE_NAME: task-api
  TERRAFORM_DIR: terraform
  SHARED_RUNNER_RESOURCE_GROUP: taskapi-dev-rg-uks
  SHARED_RUNNER_VM_NAME: taskapi-shared-cd-runner-01
  SHARED_RUNNER_REQUIRED_LABELS: taskapi-cd,vnet
  RUNNER_BOOT_TIMEOUT_SECONDS: "600"
  RUNNER_POLL_INTERVAL_SECONDS: "10"

jobs:
  validate-inputs:
    name: Validate inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate image_tag requirements
        run: |
          set -euo pipefail
          if [[ "${{ inputs.action }}" != "destroy" && -z "${{ inputs.image_tag }}" ]]; then
            echo "::error::image_tag is required for action '${{ inputs.action }}'."
            exit 1
          fi

      - name: Validate bootstrap_mode constraints
        run: |
          set -euo pipefail
          if [[ "${{ inputs.bootstrap_mode }}" == "true" && "${{ inputs.action }}" != "apply" ]]; then
            echo "::error::bootstrap_mode is only supported with action 'apply'."
            exit 1
          fi

      - name: Publish CD execution summary
        run: |
          set -euo pipefail
          VAR_FILE="vars/dev.tfvars"
          BACKEND_FILE="backend/dev.hcl"
          if [[ "${{ inputs.environment }}" == "prod" ]]; then
            VAR_FILE="vars/prod.tfvars"
            BACKEND_FILE="backend/prod.hcl"
          fi

          IMAGE_TAG="${{ inputs.image_tag }}"
          if [[ -z "$IMAGE_TAG" ]]; then
            IMAGE_TAG="n/a"
          fi

          echo "## CD Execution Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ inputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Terraform action | \`${{ inputs.action }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag | \`$IMAGE_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bootstrap mode | \`${{ inputs.bootstrap_mode }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend config | \`$BACKEND_FILE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Var file | \`$VAR_FILE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ inputs.environment }}" == "prod" && "${{ inputs.action }}" != "destroy" ]]; then
            echo "This run will promote image by digest from DEV ACR to PROD ACR before Terraform." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ "${{ inputs.bootstrap_mode }}" == "true" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Bootstrap mode will pre-create Terraform-managed env prerequisites before the normal preflight." >> "$GITHUB_STEP_SUMMARY"
            echo "Shared runner infrastructure must already exist, and \`${{ inputs.environment }}-db-password\` still must be present in the env Key Vault." >> "$GITHUB_STEP_SUMMARY"
          fi

  resolve-prod-source:
    name: Resolve source image in DEV ACR
    if: inputs.environment == 'prod' && inputs.action != 'destroy'
    needs: [validate-inputs]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    outputs:
      source_digest: ${{ steps.resolve.outputs.digest }}
      source_image: ${{ steps.resolve.outputs.source_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve workflow variables
        id: workflow_vars
        env:
          WORKFLOW_VARS_JSON: ${{ toJson(vars) }}
        run: |
          set -euo pipefail
          bash ./scripts/resolve-workflow-vars.sh \
            --context-label "resolving the prod source image" \
            --require-acr-name \
            --require-acr-login-server

      - name: Azure login (OIDC, DEV)
        uses: azure/login@v2
        with:
          client-id: ${{ steps.workflow_vars.outputs.azure_client_id }}
          tenant-id: ${{ steps.workflow_vars.outputs.azure_tenant_id }}
          subscription-id: ${{ steps.workflow_vars.outputs.azure_subscription_id }}

      - name: Resolve digest from DEV ACR
        id: resolve
        run: |
          set -euo pipefail
          DIGEST=$(az acr manifest show-metadata \
            --registry "${{ steps.workflow_vars.outputs.acr_name }}" \
            --name "${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}" \
            --query digest -o tsv)

          if [[ -z "$DIGEST" ]]; then
            echo "::error::Image '${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}' was not found in DEV ACR."
            exit 1
          fi

          SOURCE_IMAGE="${{ steps.workflow_vars.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "source_image=$SOURCE_IMAGE" >> "$GITHUB_OUTPUT"

  promote-prod-image:
    name: Promote image to PROD ACR
    if: inputs.environment == 'prod' && inputs.action != 'destroy'
    needs: [resolve-prod-source]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve workflow variables
        id: workflow_vars
        env:
          WORKFLOW_VARS_JSON: ${{ toJson(vars) }}
        run: |
          set -euo pipefail
          bash ./scripts/resolve-workflow-vars.sh \
            --context-label "promoting the prod image" \
            --require-acr-name

      - name: Azure login (OIDC, PROD)
        uses: azure/login@v2
        with:
          client-id: ${{ steps.workflow_vars.outputs.azure_client_id }}
          tenant-id: ${{ steps.workflow_vars.outputs.azure_tenant_id }}
          subscription-id: ${{ steps.workflow_vars.outputs.azure_subscription_id }}

      - name: Import image by digest into PROD ACR
        run: |
          set -euo pipefail
          az acr import \
            --name "${{ steps.workflow_vars.outputs.acr_name }}" \
            --source "${{ needs.resolve-prod-source.outputs.source_image }}" \
            --image "${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}" \
            --force

      - name: Verify promoted digest
        run: |
          set -euo pipefail
          PROD_DIGEST=$(az acr manifest show-metadata \
            --registry "${{ steps.workflow_vars.outputs.acr_name }}" \
            --name "${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}" \
            --query digest -o tsv)

          if [[ -z "$PROD_DIGEST" ]]; then
            echo "::error::Image '${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}' was not found in PROD ACR."
            exit 1
          fi

          if [[ "$PROD_DIGEST" != "${{ needs.resolve-prod-source.outputs.source_digest }}" ]]; then
            echo "::error::Digest mismatch after promotion. Expected '${{ needs.resolve-prod-source.outputs.source_digest }}', got '$PROD_DIGEST'."
            exit 1
          fi

  prod-destroy-approval-gate:
    name: Prod destroy approval gate
    if: inputs.environment == 'prod' && inputs.action == 'destroy'
    needs: [validate-inputs]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    steps:
      - name: Confirm prod destroy approval
        run: echo "Prod destroy approval granted."

  prepare-self-hosted-runner:
    name: Prepare shared self-hosted runner
    needs: [validate-inputs, promote-prod-image, prod-destroy-approval-gate]
    if: >-
      ${{
        always() &&
        needs.validate-inputs.result == 'success' &&
        (
          (inputs.environment == 'dev' && inputs.action != 'destroy') ||
          (inputs.environment == 'prod' && inputs.action != 'destroy' && needs.promote-prod-image.result == 'success')
        )
      }}
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve workflow variables
        id: workflow_vars
        env:
          WORKFLOW_VARS_JSON: ${{ toJson(vars) }}
        run: |
          set -euo pipefail
          bash ./scripts/resolve-workflow-vars.sh \
            --context-label "the shared runner control plane"

      - name: Azure login (OIDC, DEV runner control plane)
        uses: azure/login@v2
        with:
          client-id: ${{ steps.workflow_vars.outputs.azure_client_id }}
          tenant-id: ${{ steps.workflow_vars.outputs.azure_tenant_id }}
          subscription-id: ${{ steps.workflow_vars.outputs.azure_subscription_id }}

      - name: Ensure shared runner VM exists
        run: |
          set -euo pipefail
          if ! az vm show \
            --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
            --name "${{ env.SHARED_RUNNER_VM_NAME }}" \
            --query id -o tsv >/dev/null 2>&1; then
            echo "::error::Shared runner VM '${{ env.SHARED_RUNNER_VM_NAME }}' does not exist yet. Recreate and register it from a trusted local shell first."
            exit 1
          fi

      - name: Start shared runner VM
        run: |
          set -euo pipefail
          az vm start \
            --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
            --name "${{ env.SHARED_RUNNER_VM_NAME }}"

      - name: Wait for shared runner VM power state
        run: |
          set -euo pipefail

          max_attempts=$(( RUNNER_BOOT_TIMEOUT_SECONDS / RUNNER_POLL_INTERVAL_SECONDS ))
          for attempt in $(seq 1 "$max_attempts"); do
            power_state="$(az vm get-instance-view \
              --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
              --name "${{ env.SHARED_RUNNER_VM_NAME }}" \
              --query "instanceView.statuses[?starts_with(code, 'PowerState/')].code | [0]" \
              -o tsv)"

            if [[ "$power_state" == "PowerState/running" ]]; then
              echo "Shared runner VM is running."
              exit 0
            fi

            sleep "${RUNNER_POLL_INTERVAL_SECONDS}"
          done

          echo "::error::Timed out waiting for shared runner VM to reach PowerState/running."
          exit 1

      - name: Wait for GitHub runner to come online
        env:
          GH_TOKEN: ${{ secrets.GH_RUNNER_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Missing repository secret GH_RUNNER_ADMIN_TOKEN. Use a fine-grained PAT with repository Administration: read so CD can inspect self-hosted runner status."
            exit 1
          fi

          required_labels_json="$(jq -cn --arg labels "${SHARED_RUNNER_REQUIRED_LABELS}" '$labels | split(",")')"
          max_attempts=$(( RUNNER_BOOT_TIMEOUT_SECONDS / RUNNER_POLL_INTERVAL_SECONDS ))

          for attempt in $(seq 1 "$max_attempts"); do
            api_output=""
            api_error_file="$(mktemp)"
            if ! api_output="$(gh api --paginate "/repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100" 2>"${api_error_file}")"; then
              api_error="$(cat "${api_error_file}")"
              rm -f "${api_error_file}"
              if printf '%s' "${api_error}" | grep -qiE 'HTTP 403|forbidden|Resource not accessible by integration'; then
                echo "::error::GH_RUNNER_ADMIN_TOKEN cannot read repository self-hosted runners. The token must have repository Administration: read."
              else
                echo "::error::Unable to query repository self-hosted runners: ${api_error}"
              fi
              exit 1
            fi
            rm -f "${api_error_file}"

            online_runner_count="$(
              printf '%s' "${api_output}" |
              jq -s -r --argjson required "${required_labels_json}" '
                [
                  .[].runners[]
                  | select(.status == "online")
                  | select((( $required - (.labels | map(.name)) ) | length) == 0)
                ] | length
              '
            )"

            if [[ "${online_runner_count}" -ge 1 ]]; then
              echo "Shared runner is online."
              exit 0
            fi

            sleep "${RUNNER_POLL_INTERVAL_SECONDS}"
          done

          echo "::error::Timed out waiting for the shared GitHub runner to come online. If the VM was just recreated, register the runner manually once and rerun CD."
          exit 1

  terraform-dev:
    name: Terraform dev (plan/apply)
    if: >-
      ${{
        !cancelled() &&
        inputs.environment == 'dev' &&
        inputs.action != 'destroy' &&
        needs.prepare-self-hosted-runner.result == 'success'
      }}
    needs: [prepare-self-hosted-runner]
    runs-on: [self-hosted, linux, x64, taskapi-cd, vnet]
    environment: dev
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      RBAC_PROPAGATION_WAIT_SECONDS: "45"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Resolve workflow variables
        id: workflow_vars
        env:
          WORKFLOW_VARS_JSON: ${{ toJson(vars) }}
        run: |
          set -euo pipefail
          bash ./scripts/resolve-workflow-vars.sh \
            --context-label "the dev Terraform job" \
            --export-arm-env \
            --export-tf-env \
            --rbac-propagation-wait-seconds "${RBAC_PROPAGATION_WAIT_SECONDS}" \
            --container-image-tag "${{ inputs.image_tag }}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ steps.workflow_vars.outputs.azure_client_id }}
          tenant-id: ${{ steps.workflow_vars.outputs.azure_tenant_id }}
          subscription-id: ${{ steps.workflow_vars.outputs.azure_subscription_id }}

      - name: Terraform init
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} init -backend-config=backend/dev.hcl -reconfigure

      - name: Bootstrap Terraform-managed env prerequisites (dev)
        if: inputs.bootstrap_mode == true && inputs.action == 'apply'
        run: |
          set -euo pipefail
          terraform -chdir=${{ env.TERRAFORM_DIR }} apply -var-file=vars/dev.tfvars -auto-approve \
            -target=azurerm_key_vault.main[0] \
            -target=azurerm_private_endpoint.key_vault[0] \
            -target=azurerm_container_app_environment.main[0] \
            -target=azurerm_user_assigned_identity.container_app \
            -target=azurerm_role_assignment.key_vault_secrets_user

      - name: Preflight security checks (dev)
        if: inputs.action != 'destroy'
        run: |
          set -euo pipefail
          ./scripts/check-post-refactor-prereqs.sh \
            --environment "dev" \
            --repo "${GITHUB_REPOSITORY}" \
            --skip-github-runner-readiness \
            --strict-runner

      - name: Adopt existing Container App into Terraform state (dev)
        if: inputs.action == 'apply'
        run: |
          set -euo pipefail

          extract_tfvar_string() {
            local file="$1"
            local key="$2"
            sed -n "s/^[[:space:]]*${key}[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p" "${file}" | head -n 1
          }

          DEV_TFVARS="${{ env.TERRAFORM_DIR }}/vars/dev.tfvars"
          PROJECT_NAME="$(sed -n '/variable "project"/,/}/s/.*default[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p' "${{ env.TERRAFORM_DIR }}/variables.tf" | head -n 1)"
          ENV_NAME="$(extract_tfvar_string "${DEV_TFVARS}" "env")"
          if [[ -z "${ENV_NAME}" ]]; then
            ENV_NAME="dev"
          fi

          RG_NAME="${PROJECT_NAME}-${ENV_NAME}-rg-uks"
          APP_NAME="${PROJECT_NAME}-${ENV_NAME}-app"
          APP_ID="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.App/containerApps/${APP_NAME}"

          if terraform -chdir=${{ env.TERRAFORM_DIR }} state show azurerm_container_app.main >/dev/null 2>&1; then
            echo "Container App is already managed in Terraform state."
            exit 0
          fi

          if az resource show --ids "${APP_ID}" >/dev/null 2>&1; then
            echo "Found existing Container App ${APP_NAME}; importing into Terraform state."
            terraform -chdir=${{ env.TERRAFORM_DIR }} import -var-file=vars/dev.tfvars azurerm_container_app.main "${APP_ID}"
          else
            echo "Container App ${APP_NAME} does not exist yet; no import required."
          fi

      - name: Terraform plan/apply/destroy (dev)
        run: |
          set -euo pipefail
          case "${{ inputs.action }}" in
            plan)
              terraform -chdir=${{ env.TERRAFORM_DIR }} plan -var-file=vars/dev.tfvars
              ;;
            apply)
              terraform -chdir=${{ env.TERRAFORM_DIR }} plan -var-file=vars/dev.tfvars -out=tfplan
              terraform -chdir=${{ env.TERRAFORM_DIR }} apply -auto-approve tfplan
              ;;
            destroy)
              terraform -chdir=${{ env.TERRAFORM_DIR }} destroy -var-file=vars/dev.tfvars -auto-approve
              ;;
            *)
              echo "::error::Unsupported action '${{ inputs.action }}'."
              exit 1
              ;;
          esac

  terraform-dev-destroy:
    name: Terraform dev (destroy)
    if: >-
      ${{
        !cancelled() &&
        inputs.environment == 'dev' &&
        inputs.action == 'destroy' &&
        needs.validate-inputs.result == 'success'
      }}
    needs: [validate-inputs]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    env:
      RBAC_PROPAGATION_WAIT_SECONDS: "45"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Resolve workflow variables
        id: workflow_vars
        env:
          WORKFLOW_VARS_JSON: ${{ toJson(vars) }}
        run: |
          set -euo pipefail
          bash ./scripts/resolve-workflow-vars.sh \
            --context-label "the dev destroy job" \
            --export-arm-env \
            --export-tf-env \
            --rbac-propagation-wait-seconds "${RBAC_PROPAGATION_WAIT_SECONDS}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ steps.workflow_vars.outputs.azure_client_id }}
          tenant-id: ${{ steps.workflow_vars.outputs.azure_tenant_id }}
          subscription-id: ${{ steps.workflow_vars.outputs.azure_subscription_id }}

      - name: Terraform init
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} init -backend-config=backend/dev.hcl -reconfigure

      - name: Resolve break-glass Key Vault access (dev)
        run: |
          set -euo pipefail

          extract_tfvar_string() {
            local file="$1"
            local key="$2"
            sed -n "s/^[[:space:]]*${key}[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p" "${file}" | head -n 1
          }

          extract_tfvar_bool() {
            local file="$1"
            local key="$2"
            sed -n "s/^[[:space:]]*${key}[[:space:]]*=[[:space:]]*\(true\|false\).*/\1/p" "${file}" | head -n 1
          }

          TFVARS_FILE="${{ env.TERRAFORM_DIR }}/vars/dev.tfvars"
          PROJECT_NAME="$(sed -n '/variable "project"/,/}/s/.*default[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p' "${{ env.TERRAFORM_DIR }}/variables.tf" | head -n 1)"
          ENV_NAME="$(extract_tfvar_string "${TFVARS_FILE}" "env")"
          USE_SHARED_KEY_VAULT="$(extract_tfvar_bool "${TFVARS_FILE}" "use_shared_key_vault")"

          if [[ -z "${ENV_NAME}" ]]; then
            ENV_NAME="dev"
          fi

          if [[ "${USE_SHARED_KEY_VAULT}" == "true" ]]; then
            KV_NAME="$(extract_tfvar_string "${TFVARS_FILE}" "shared_key_vault_name")"
            KV_RG="$(extract_tfvar_string "${TFVARS_FILE}" "shared_key_vault_resource_group_name")"
          else
            KV_NAME="$(extract_tfvar_string "${TFVARS_FILE}" "key_vault_name")"
            if [[ -z "${KV_NAME}" ]]; then
              KV_NAME="${PROJECT_NAME}-${ENV_NAME}-kv-uks"
            fi
            KV_RG="${PROJECT_NAME}-${ENV_NAME}-rg-uks"
          fi

          if [[ -z "${KV_NAME}" || -z "${KV_RG}" ]]; then
            echo "::error::Unable to resolve Key Vault name/resource group for hosted destroy."
            exit 1
          fi

          RUNNER_PUBLIC_IP="$(curl -fsS https://api.ipify.org)"
          PREEXISTING_RULE_COUNT="$(
            az keyvault network-rule list \
              --name "${KV_NAME}" \
              --resource-group "${KV_RG}" \
              --query "ipRules[?value=='${RUNNER_PUBLIC_IP}'] | length(@)" \
              -o tsv
          )"

          echo "BREAK_GLASS_KEY_VAULT_NAME=${KV_NAME}" >> "$GITHUB_ENV"
          echo "BREAK_GLASS_KEY_VAULT_RG=${KV_RG}" >> "$GITHUB_ENV"
          echo "RUNNER_PUBLIC_IP=${RUNNER_PUBLIC_IP}" >> "$GITHUB_ENV"

          if [[ "${PREEXISTING_RULE_COUNT}" == "1" ]]; then
            echo "BREAK_GLASS_ALLOWLIST_PREEXISTING=true" >> "$GITHUB_ENV"
          else
            echo "BREAK_GLASS_ALLOWLIST_PREEXISTING=false" >> "$GITHUB_ENV"
          fi

      - name: Temporarily allow hosted runner IP to access Key Vault (dev)
        run: |
          set -euo pipefail

          if [[ "${BREAK_GLASS_ALLOWLIST_PREEXISTING:-false}" == "true" ]]; then
            echo "Hosted runner IP is already allowlisted on Key Vault."
            exit 0
          fi

          az keyvault network-rule add \
            --name "${BREAK_GLASS_KEY_VAULT_NAME}" \
            --resource-group "${BREAK_GLASS_KEY_VAULT_RG}" \
            --ip-address "${RUNNER_PUBLIC_IP}" >/dev/null
          echo "BREAK_GLASS_ALLOWLIST_ADDED=true" >> "$GITHUB_ENV"
          sleep 10

      - name: Terraform destroy (dev)
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} destroy -var-file=vars/dev.tfvars -auto-approve

      - name: Remove hosted runner IP from Key Vault (dev)
        if: always()
        run: |
          set -euo pipefail

          if [[ "${BREAK_GLASS_ALLOWLIST_ADDED:-false}" != "true" ]]; then
            echo "No temporary Key Vault allowlist was added."
            exit 0
          fi

          if ! az keyvault show \
            --name "${BREAK_GLASS_KEY_VAULT_NAME}" \
            --resource-group "${BREAK_GLASS_KEY_VAULT_RG}" \
            --query id -o tsv >/dev/null 2>&1; then
            echo "Key Vault already removed; no firewall cleanup required."
            exit 0
          fi

          az keyvault network-rule remove \
            --name "${BREAK_GLASS_KEY_VAULT_NAME}" \
            --resource-group "${BREAK_GLASS_KEY_VAULT_RG}" \
            --ip-address "${RUNNER_PUBLIC_IP}" >/dev/null || true

  terraform-prod:
    name: Terraform prod (plan/apply)
    if: >-
      ${{
        !cancelled() &&
        inputs.environment == 'prod' &&
        inputs.action != 'destroy' &&
        needs.prepare-self-hosted-runner.result == 'success'
      }}
    needs: [prepare-self-hosted-runner]
    runs-on: [self-hosted, linux, x64, taskapi-cd, vnet]
    environment: prod
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      RBAC_PROPAGATION_WAIT_SECONDS: "45"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Resolve workflow variables
        id: workflow_vars
        env:
          WORKFLOW_VARS_JSON: ${{ toJson(vars) }}
        run: |
          set -euo pipefail
          bash ./scripts/resolve-workflow-vars.sh \
            --context-label "the prod Terraform job" \
            --export-arm-env \
            --export-tf-env \
            --rbac-propagation-wait-seconds "${RBAC_PROPAGATION_WAIT_SECONDS}" \
            --container-image-tag "${{ inputs.image_tag }}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ steps.workflow_vars.outputs.azure_client_id }}
          tenant-id: ${{ steps.workflow_vars.outputs.azure_tenant_id }}
          subscription-id: ${{ steps.workflow_vars.outputs.azure_subscription_id }}

      - name: Terraform init
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} init -backend-config=backend/prod.hcl -reconfigure

      - name: Bootstrap Terraform-managed env prerequisites (prod)
        if: inputs.bootstrap_mode == true && inputs.action == 'apply'
        run: |
          set -euo pipefail
          terraform -chdir=${{ env.TERRAFORM_DIR }} apply -var-file=vars/prod.tfvars -auto-approve \
            -target=azurerm_key_vault.main[0] \
            -target=azurerm_private_endpoint.key_vault[0] \
            -target=azurerm_container_app_environment.main[0] \
            -target=azurerm_user_assigned_identity.container_app \
            -target=azurerm_role_assignment.key_vault_secrets_user

      - name: Preflight security checks (prod)
        run: |
          set -euo pipefail
          ./scripts/check-post-refactor-prereqs.sh \
            --environment "prod" \
            --repo "${GITHUB_REPOSITORY}" \
            --skip-github-runner-readiness \
            --strict-runner

      - name: Adopt existing Container App into Terraform state (prod)
        if: inputs.action == 'apply'
        run: |
          set -euo pipefail

          extract_tfvar_string() {
            local file="$1"
            local key="$2"
            sed -n "s/^[[:space:]]*${key}[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p" "${file}" | head -n 1
          }

          PROD_TFVARS="${{ env.TERRAFORM_DIR }}/vars/prod.tfvars"
          PROJECT_NAME="$(sed -n '/variable "project"/,/}/s/.*default[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p' "${{ env.TERRAFORM_DIR }}/variables.tf" | head -n 1)"
          ENV_NAME="$(extract_tfvar_string "${PROD_TFVARS}" "env")"
          if [[ -z "${ENV_NAME}" ]]; then
            ENV_NAME="prod"
          fi

          RG_NAME="${PROJECT_NAME}-${ENV_NAME}-rg-uks"
          APP_NAME="${PROJECT_NAME}-${ENV_NAME}-app"
          APP_ID="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.App/containerApps/${APP_NAME}"

          if terraform -chdir=${{ env.TERRAFORM_DIR }} state show azurerm_container_app.main >/dev/null 2>&1; then
            echo "Container App is already managed in Terraform state."
            exit 0
          fi

          if az resource show --ids "${APP_ID}" >/dev/null 2>&1; then
            echo "Found existing Container App ${APP_NAME}; importing into Terraform state."
            terraform -chdir=${{ env.TERRAFORM_DIR }} import -var-file=vars/prod.tfvars azurerm_container_app.main "${APP_ID}"
          else
            echo "Container App ${APP_NAME} does not exist yet; no import required."
          fi

      - name: Terraform plan/apply (prod)
        run: |
          set -euo pipefail
          case "${{ inputs.action }}" in
            plan)
              terraform -chdir=${{ env.TERRAFORM_DIR }} plan -var-file=vars/prod.tfvars
              ;;
            apply)
              terraform -chdir=${{ env.TERRAFORM_DIR }} plan -var-file=vars/prod.tfvars -out=tfplan
              terraform -chdir=${{ env.TERRAFORM_DIR }} apply -auto-approve tfplan
              ;;
            *)
              echo "::error::Unsupported action '${{ inputs.action }}' for this job."
              exit 1
              ;;
          esac

  terraform-prod-destroy:
    name: Terraform prod (destroy)
    if: >-
      ${{
        !cancelled() &&
        inputs.environment == 'prod' &&
        inputs.action == 'destroy' &&
        needs.validate-inputs.result == 'success' &&
        needs.prod-destroy-approval-gate.result == 'success'
      }}
    needs: [validate-inputs, prod-destroy-approval-gate]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    env:
      RBAC_PROPAGATION_WAIT_SECONDS: "45"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Resolve workflow variables
        id: workflow_vars
        env:
          WORKFLOW_VARS_JSON: ${{ toJson(vars) }}
        run: |
          set -euo pipefail
          bash ./scripts/resolve-workflow-vars.sh \
            --context-label "the prod destroy job" \
            --export-arm-env \
            --export-tf-env \
            --rbac-propagation-wait-seconds "${RBAC_PROPAGATION_WAIT_SECONDS}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ steps.workflow_vars.outputs.azure_client_id }}
          tenant-id: ${{ steps.workflow_vars.outputs.azure_tenant_id }}
          subscription-id: ${{ steps.workflow_vars.outputs.azure_subscription_id }}

      - name: Terraform init
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} init -backend-config=backend/prod.hcl -reconfigure

      - name: Resolve break-glass Key Vault access (prod)
        run: |
          set -euo pipefail

          extract_tfvar_string() {
            local file="$1"
            local key="$2"
            sed -n "s/^[[:space:]]*${key}[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p" "${file}" | head -n 1
          }

          extract_tfvar_bool() {
            local file="$1"
            local key="$2"
            sed -n "s/^[[:space:]]*${key}[[:space:]]*=[[:space:]]*\(true\|false\).*/\1/p" "${file}" | head -n 1
          }

          TFVARS_FILE="${{ env.TERRAFORM_DIR }}/vars/prod.tfvars"
          PROJECT_NAME="$(sed -n '/variable "project"/,/}/s/.*default[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p' "${{ env.TERRAFORM_DIR }}/variables.tf" | head -n 1)"
          ENV_NAME="$(extract_tfvar_string "${TFVARS_FILE}" "env")"
          USE_SHARED_KEY_VAULT="$(extract_tfvar_bool "${TFVARS_FILE}" "use_shared_key_vault")"

          if [[ -z "${ENV_NAME}" ]]; then
            ENV_NAME="prod"
          fi

          if [[ "${USE_SHARED_KEY_VAULT}" == "true" ]]; then
            KV_NAME="$(extract_tfvar_string "${TFVARS_FILE}" "shared_key_vault_name")"
            KV_RG="$(extract_tfvar_string "${TFVARS_FILE}" "shared_key_vault_resource_group_name")"
          else
            KV_NAME="$(extract_tfvar_string "${TFVARS_FILE}" "key_vault_name")"
            if [[ -z "${KV_NAME}" ]]; then
              KV_NAME="${PROJECT_NAME}-${ENV_NAME}-kv-uks"
            fi
            KV_RG="${PROJECT_NAME}-${ENV_NAME}-rg-uks"
          fi

          if [[ -z "${KV_NAME}" || -z "${KV_RG}" ]]; then
            echo "::error::Unable to resolve Key Vault name/resource group for hosted destroy."
            exit 1
          fi

          RUNNER_PUBLIC_IP="$(curl -fsS https://api.ipify.org)"
          PREEXISTING_RULE_COUNT="$(
            az keyvault network-rule list \
              --name "${KV_NAME}" \
              --resource-group "${KV_RG}" \
              --query "ipRules[?value=='${RUNNER_PUBLIC_IP}'] | length(@)" \
              -o tsv
          )"

          echo "BREAK_GLASS_KEY_VAULT_NAME=${KV_NAME}" >> "$GITHUB_ENV"
          echo "BREAK_GLASS_KEY_VAULT_RG=${KV_RG}" >> "$GITHUB_ENV"
          echo "RUNNER_PUBLIC_IP=${RUNNER_PUBLIC_IP}" >> "$GITHUB_ENV"

          if [[ "${PREEXISTING_RULE_COUNT}" == "1" ]]; then
            echo "BREAK_GLASS_ALLOWLIST_PREEXISTING=true" >> "$GITHUB_ENV"
          else
            echo "BREAK_GLASS_ALLOWLIST_PREEXISTING=false" >> "$GITHUB_ENV"
          fi

      - name: Temporarily allow hosted runner IP to access Key Vault (prod)
        run: |
          set -euo pipefail

          if [[ "${BREAK_GLASS_ALLOWLIST_PREEXISTING:-false}" == "true" ]]; then
            echo "Hosted runner IP is already allowlisted on Key Vault."
            exit 0
          fi

          az keyvault network-rule add \
            --name "${BREAK_GLASS_KEY_VAULT_NAME}" \
            --resource-group "${BREAK_GLASS_KEY_VAULT_RG}" \
            --ip-address "${RUNNER_PUBLIC_IP}" >/dev/null
          echo "BREAK_GLASS_ALLOWLIST_ADDED=true" >> "$GITHUB_ENV"
          sleep 10

      - name: Terraform destroy (prod)
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} destroy -var-file=vars/prod.tfvars -auto-approve

      - name: Remove hosted runner IP from Key Vault (prod)
        if: always()
        run: |
          set -euo pipefail

          if [[ "${BREAK_GLASS_ALLOWLIST_ADDED:-false}" != "true" ]]; then
            echo "No temporary Key Vault allowlist was added."
            exit 0
          fi

          if ! az keyvault show \
            --name "${BREAK_GLASS_KEY_VAULT_NAME}" \
            --resource-group "${BREAK_GLASS_KEY_VAULT_RG}" \
            --query id -o tsv >/dev/null 2>&1; then
            echo "Key Vault already removed; no firewall cleanup required."
            exit 0
          fi

          az keyvault network-rule remove \
            --name "${BREAK_GLASS_KEY_VAULT_NAME}" \
            --resource-group "${BREAK_GLASS_KEY_VAULT_RG}" \
            --ip-address "${RUNNER_PUBLIC_IP}" >/dev/null || true

  cleanup-self-hosted-runner:
    name: Deallocate shared self-hosted runner
    needs: [prepare-self-hosted-runner, terraform-dev, terraform-dev-destroy, terraform-prod, terraform-prod-destroy]
    if: >-
      ${{
        always() &&
        (
          needs.prepare-self-hosted-runner.result == 'success' ||
          needs.prepare-self-hosted-runner.result == 'failure'
        )
      }}
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve workflow variables
        id: workflow_vars
        env:
          WORKFLOW_VARS_JSON: ${{ toJson(vars) }}
        run: |
          set -euo pipefail
          bash ./scripts/resolve-workflow-vars.sh \
            --context-label "the shared runner cleanup job"

      - name: Azure login (OIDC, DEV runner control plane)
        uses: azure/login@v2
        with:
          client-id: ${{ steps.workflow_vars.outputs.azure_client_id }}
          tenant-id: ${{ steps.workflow_vars.outputs.azure_tenant_id }}
          subscription-id: ${{ steps.workflow_vars.outputs.azure_subscription_id }}

      - name: Deallocate shared runner VM
        run: |
          set -euo pipefail

          if ! az vm show \
            --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
            --name "${{ env.SHARED_RUNNER_VM_NAME }}" \
            --query id -o tsv >/dev/null 2>&1; then
            echo "Shared runner VM not found; nothing to deallocate."
            exit 0
          fi

          az vm deallocate \
            --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
            --name "${{ env.SHARED_RUNNER_VM_NAME }}"

      - name: Confirm shared runner VM is deallocated
        run: |
          set -euo pipefail

          if ! az vm show \
            --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
            --name "${{ env.SHARED_RUNNER_VM_NAME }}" \
            --query id -o tsv >/dev/null 2>&1; then
            echo "Shared runner VM no longer exists."
            exit 0
          fi

          power_state="$(az vm get-instance-view \
            --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
            --name "${{ env.SHARED_RUNNER_VM_NAME }}" \
            --query "instanceView.statuses[?starts_with(code, 'PowerState/')].code | [0]" \
            -o tsv)"

          if [[ "$power_state" != "PowerState/deallocated" ]]; then
            echo "::error::Expected shared runner VM to be deallocated, got '${power_state}'."
            exit 1
          fi
