name: CD
run-name: CD | env=${{ inputs.environment }} | tf=${{ inputs.action }} | image=${{ inputs.image_tag || 'n/a' }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Terraform action"
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy
      image_tag:
        description: "Immutable image tag from CI (example: sha-abc1234). Required for plan/apply."
        required: false
        type: string

concurrency:
  group: cd-shared-runner
  cancel-in-progress: false

env:
  IMAGE_NAME: task-api
  TERRAFORM_DIR: terraform
  SHARED_RUNNER_RESOURCE_GROUP: taskapi-dev-rg-uks
  SHARED_RUNNER_VM_NAME: taskapi-shared-cd-runner-01
  SHARED_RUNNER_REQUIRED_LABELS: taskapi-cd,vnet
  RUNNER_BOOT_TIMEOUT_SECONDS: "600"
  RUNNER_POLL_INTERVAL_SECONDS: "10"

jobs:
  validate-inputs:
    name: Validate inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate image_tag requirements
        run: |
          set -euo pipefail
          if [[ "${{ inputs.action }}" != "destroy" && -z "${{ inputs.image_tag }}" ]]; then
            echo "::error::image_tag is required for action '${{ inputs.action }}'."
            exit 1
          fi

      - name: Publish CD execution summary
        run: |
          set -euo pipefail
          VAR_FILE="vars/dev.tfvars"
          BACKEND_FILE="backend/dev.hcl"
          if [[ "${{ inputs.environment }}" == "prod" ]]; then
            VAR_FILE="vars/prod.tfvars"
            BACKEND_FILE="backend/prod.hcl"
          fi

          IMAGE_TAG="${{ inputs.image_tag }}"
          if [[ -z "$IMAGE_TAG" ]]; then
            IMAGE_TAG="n/a"
          fi

          echo "## CD Execution Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ inputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Terraform action | \`${{ inputs.action }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag | \`$IMAGE_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend config | \`$BACKEND_FILE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Var file | \`$VAR_FILE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ inputs.environment }}" == "prod" && "${{ inputs.action }}" != "destroy" ]]; then
            echo "This run will promote image by digest from DEV ACR to PROD ACR before Terraform." >> "$GITHUB_STEP_SUMMARY"
          fi

  resolve-prod-source:
    name: Resolve source image in DEV ACR
    if: inputs.environment == 'prod' && inputs.action != 'destroy'
    needs: [validate-inputs]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    outputs:
      source_digest: ${{ steps.resolve.outputs.digest }}
      source_image: ${{ steps.resolve.outputs.source_image }}
    steps:
      - name: Azure login (OIDC, DEV)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve digest from DEV ACR
        id: resolve
        run: |
          set -euo pipefail
          DIGEST=$(az acr manifest show-metadata \
            --registry "${{ vars.ACR_NAME }}" \
            --name "${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}" \
            --query digest -o tsv)

          if [[ -z "$DIGEST" ]]; then
            echo "::error::Image '${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}' was not found in DEV ACR."
            exit 1
          fi

          SOURCE_IMAGE="${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "source_image=$SOURCE_IMAGE" >> "$GITHUB_OUTPUT"

  promote-prod-image:
    name: Promote image to PROD ACR
    if: inputs.environment == 'prod' && inputs.action != 'destroy'
    needs: [resolve-prod-source]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Azure login (OIDC, PROD)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Import image by digest into PROD ACR
        run: |
          set -euo pipefail
          az acr import \
            --name "${{ vars.ACR_NAME }}" \
            --source "${{ needs.resolve-prod-source.outputs.source_image }}" \
            --image "${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}" \
            --force

      - name: Verify promoted digest
        run: |
          set -euo pipefail
          PROD_DIGEST=$(az acr manifest show-metadata \
            --registry "${{ vars.ACR_NAME }}" \
            --name "${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}" \
            --query digest -o tsv)

          if [[ -z "$PROD_DIGEST" ]]; then
            echo "::error::Image '${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}' was not found in PROD ACR."
            exit 1
          fi

          if [[ "$PROD_DIGEST" != "${{ needs.resolve-prod-source.outputs.source_digest }}" ]]; then
            echo "::error::Digest mismatch after promotion. Expected '${{ needs.resolve-prod-source.outputs.source_digest }}', got '$PROD_DIGEST'."
            exit 1
          fi

  prod-destroy-approval-gate:
    name: Prod destroy approval gate
    if: inputs.environment == 'prod' && inputs.action == 'destroy'
    needs: [validate-inputs]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    steps:
      - name: Confirm prod destroy approval
        run: echo "Prod destroy approval granted."

  prepare-self-hosted-runner:
    name: Prepare shared self-hosted runner
    needs: [validate-inputs, promote-prod-image, prod-destroy-approval-gate]
    if: >-
      ${{
        always() &&
        needs.validate-inputs.result == 'success' &&
        (
          inputs.environment == 'dev' ||
          (inputs.environment == 'prod' && inputs.action != 'destroy' && needs.promote-prod-image.result == 'success') ||
          (inputs.environment == 'prod' && inputs.action == 'destroy' && needs.prod-destroy-approval-gate.result == 'success')
        )
      }}
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Azure login (OIDC, DEV runner control plane)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure shared runner VM exists
        run: |
          set -euo pipefail
          if ! az vm show \
            --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
            --name "${{ env.SHARED_RUNNER_VM_NAME }}" \
            --query id -o tsv >/dev/null 2>&1; then
            echo "::error::Shared runner VM '${{ env.SHARED_RUNNER_VM_NAME }}' does not exist yet. Recreate and register it from a trusted local shell first."
            exit 1
          fi

      - name: Start shared runner VM
        run: |
          set -euo pipefail
          az vm start \
            --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
            --name "${{ env.SHARED_RUNNER_VM_NAME }}"

      - name: Wait for shared runner VM power state
        run: |
          set -euo pipefail

          max_attempts=$(( RUNNER_BOOT_TIMEOUT_SECONDS / RUNNER_POLL_INTERVAL_SECONDS ))
          for attempt in $(seq 1 "$max_attempts"); do
            power_state="$(az vm get-instance-view \
              --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
              --name "${{ env.SHARED_RUNNER_VM_NAME }}" \
              --query "instanceView.statuses[?starts_with(code, 'PowerState/')].code | [0]" \
              -o tsv)"

            if [[ "$power_state" == "PowerState/running" ]]; then
              echo "Shared runner VM is running."
              exit 0
            fi

            sleep "${RUNNER_POLL_INTERVAL_SECONDS}"
          done

          echo "::error::Timed out waiting for shared runner VM to reach PowerState/running."
          exit 1

      - name: Wait for GitHub runner to come online
        env:
          GH_TOKEN: ${{ secrets.GH_RUNNER_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Missing repository secret GH_RUNNER_ADMIN_TOKEN. Use a fine-grained PAT or GitHub App token with repository Administration: read so CD can inspect self-hosted runner status."
            exit 1
          fi

          required_labels_json="$(jq -cn --arg labels "${SHARED_RUNNER_REQUIRED_LABELS}" '$labels | split(",")')"
          max_attempts=$(( RUNNER_BOOT_TIMEOUT_SECONDS / RUNNER_POLL_INTERVAL_SECONDS ))

          for attempt in $(seq 1 "$max_attempts"); do
            api_output=""
            if ! api_output="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100" 2>&1)"; then
              if printf '%s' "${api_output}" | grep -qiE 'HTTP 403|forbidden|Resource not accessible by integration'; then
                echo "::error::GH_RUNNER_ADMIN_TOKEN cannot read repository self-hosted runners. The token must have repository Administration: read."
              else
                echo "::error::Unable to query repository self-hosted runners: ${api_output}"
              fi
              exit 1
            fi

            online_runner_count="$(
              printf '%s' "${api_output}" |
              jq -r --argjson required "${required_labels_json}" '
                [
                  .runners[]
                  | select(.status == "online")
                  | select((( $required - (.labels | map(.name)) ) | length) == 0)
                ] | length
              '
            )"

            if [[ "${online_runner_count}" -ge 1 ]]; then
              echo "Shared runner is online."
              exit 0
            fi

            sleep "${RUNNER_POLL_INTERVAL_SECONDS}"
          done

          echo "::error::Timed out waiting for the shared GitHub runner to come online. If the VM was just recreated, register the runner manually once and rerun CD."
          exit 1

  terraform-dev:
    name: Terraform dev
    if: inputs.environment == 'dev'
    needs: [prepare-self-hosted-runner]
    runs-on: [self-hosted, linux, x64, taskapi-cd, vnet]
    environment: dev
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      APP_ENV_VARS_JSON: ${{ vars.TF_APP_ENV_VARS_JSON }}
      RBAC_PROPAGATION_WAIT_SECONDS: "45"
      SHARED_RUNNER_ADMIN_SSH_PUBLIC_KEY: ${{ vars.TF_SHARED_RUNNER_ADMIN_SSH_PUBLIC_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Export Terraform variables
        run: |
          set -euo pipefail
          echo "TF_VAR_rbac_propagation_wait_seconds=${RBAC_PROPAGATION_WAIT_SECONDS}" >> "$GITHUB_ENV"

          if [[ "${{ inputs.action }}" != "destroy" ]]; then
            echo "TF_VAR_container_image_tag=${{ inputs.image_tag }}" >> "$GITHUB_ENV"
          fi

          if [[ -n "$APP_ENV_VARS_JSON" ]]; then
            echo "TF_VAR_app_env_vars=$APP_ENV_VARS_JSON" >> "$GITHUB_ENV"
          fi

          if [[ -n "$SHARED_RUNNER_ADMIN_SSH_PUBLIC_KEY" ]]; then
            echo "TF_VAR_shared_runner_admin_ssh_public_key=$SHARED_RUNNER_ADMIN_SSH_PUBLIC_KEY" >> "$GITHUB_ENV"
          fi

      - name: Preflight security checks (dev)
        if: inputs.action != 'destroy'
        env:
          GH_TOKEN: ${{ secrets.GH_RUNNER_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          ./scripts/check-post-refactor-prereqs.sh \
            --environment "dev" \
            --repo "${GITHUB_REPOSITORY}" \
            --strict-runner

      - name: Terraform init
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} init -backend-config=backend/dev.hcl -reconfigure

      - name: Adopt existing Container App into Terraform state (dev)
        if: inputs.action == 'apply'
        run: |
          set -euo pipefail

          extract_tfvar_string() {
            local file="$1"
            local key="$2"
            sed -n "s/^[[:space:]]*${key}[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p" "${file}" | head -n 1
          }

          DEV_TFVARS="${{ env.TERRAFORM_DIR }}/vars/dev.tfvars"
          PROJECT_NAME="$(sed -n '/variable "project"/,/}/s/.*default[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p' "${{ env.TERRAFORM_DIR }}/variables.tf" | head -n 1)"
          ENV_NAME="$(extract_tfvar_string "${DEV_TFVARS}" "env")"
          if [[ -z "${ENV_NAME}" ]]; then
            ENV_NAME="dev"
          fi

          RG_NAME="${PROJECT_NAME}-${ENV_NAME}-rg-uks"
          APP_NAME="${PROJECT_NAME}-${ENV_NAME}-app"
          APP_ID="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.App/containerApps/${APP_NAME}"

          if terraform -chdir=${{ env.TERRAFORM_DIR }} state show azurerm_container_app.main >/dev/null 2>&1; then
            echo "Container App is already managed in Terraform state."
            exit 0
          fi

          if az resource show --ids "${APP_ID}" >/dev/null 2>&1; then
            echo "Found existing Container App ${APP_NAME}; importing into Terraform state."
            terraform -chdir=${{ env.TERRAFORM_DIR }} import -var-file=vars/dev.tfvars azurerm_container_app.main "${APP_ID}"
          else
            echo "Container App ${APP_NAME} does not exist yet; no import required."
          fi

      - name: Terraform plan/apply/destroy (dev)
        run: |
          set -euo pipefail
          case "${{ inputs.action }}" in
            plan)
              terraform -chdir=${{ env.TERRAFORM_DIR }} plan -var-file=vars/dev.tfvars
              ;;
            apply)
              terraform -chdir=${{ env.TERRAFORM_DIR }} plan -var-file=vars/dev.tfvars -out=tfplan
              terraform -chdir=${{ env.TERRAFORM_DIR }} apply -auto-approve tfplan
              ;;
            destroy)
              terraform -chdir=${{ env.TERRAFORM_DIR }} destroy -var-file=vars/dev.tfvars -auto-approve
              ;;
            *)
              echo "::error::Unsupported action '${{ inputs.action }}'."
              exit 1
              ;;
          esac

  terraform-prod:
    name: Terraform prod (plan/apply)
    if: inputs.environment == 'prod' && inputs.action != 'destroy'
    needs: [prepare-self-hosted-runner]
    runs-on: [self-hosted, linux, x64, taskapi-cd, vnet]
    environment: prod
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      APP_ENV_VARS_JSON: ${{ vars.TF_APP_ENV_VARS_JSON }}
      RBAC_PROPAGATION_WAIT_SECONDS: "45"
      SHARED_RUNNER_ADMIN_SSH_PUBLIC_KEY: ${{ vars.TF_SHARED_RUNNER_ADMIN_SSH_PUBLIC_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Export Terraform variables
        run: |
          set -euo pipefail
          echo "TF_VAR_rbac_propagation_wait_seconds=${RBAC_PROPAGATION_WAIT_SECONDS}" >> "$GITHUB_ENV"
          echo "TF_VAR_container_image_tag=${{ inputs.image_tag }}" >> "$GITHUB_ENV"

          if [[ -n "$APP_ENV_VARS_JSON" ]]; then
            echo "TF_VAR_app_env_vars=$APP_ENV_VARS_JSON" >> "$GITHUB_ENV"
          fi

          if [[ -n "$SHARED_RUNNER_ADMIN_SSH_PUBLIC_KEY" ]]; then
            echo "TF_VAR_shared_runner_admin_ssh_public_key=$SHARED_RUNNER_ADMIN_SSH_PUBLIC_KEY" >> "$GITHUB_ENV"
          fi

      - name: Preflight security checks (prod)
        env:
          GH_TOKEN: ${{ secrets.GH_RUNNER_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          ./scripts/check-post-refactor-prereqs.sh \
            --environment "prod" \
            --repo "${GITHUB_REPOSITORY}" \
            --strict-runner

      - name: Terraform init
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} init -backend-config=backend/prod.hcl -reconfigure

      - name: Adopt existing Container App into Terraform state (prod)
        if: inputs.action == 'apply'
        run: |
          set -euo pipefail

          extract_tfvar_string() {
            local file="$1"
            local key="$2"
            sed -n "s/^[[:space:]]*${key}[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p" "${file}" | head -n 1
          }

          PROD_TFVARS="${{ env.TERRAFORM_DIR }}/vars/prod.tfvars"
          PROJECT_NAME="$(sed -n '/variable "project"/,/}/s/.*default[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p' "${{ env.TERRAFORM_DIR }}/variables.tf" | head -n 1)"
          ENV_NAME="$(extract_tfvar_string "${PROD_TFVARS}" "env")"
          if [[ -z "${ENV_NAME}" ]]; then
            ENV_NAME="prod"
          fi

          RG_NAME="${PROJECT_NAME}-${ENV_NAME}-rg-uks"
          APP_NAME="${PROJECT_NAME}-${ENV_NAME}-app"
          APP_ID="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.App/containerApps/${APP_NAME}"

          if terraform -chdir=${{ env.TERRAFORM_DIR }} state show azurerm_container_app.main >/dev/null 2>&1; then
            echo "Container App is already managed in Terraform state."
            exit 0
          fi

          if az resource show --ids "${APP_ID}" >/dev/null 2>&1; then
            echo "Found existing Container App ${APP_NAME}; importing into Terraform state."
            terraform -chdir=${{ env.TERRAFORM_DIR }} import -var-file=vars/prod.tfvars azurerm_container_app.main "${APP_ID}"
          else
            echo "Container App ${APP_NAME} does not exist yet; no import required."
          fi

      - name: Terraform plan/apply (prod)
        run: |
          set -euo pipefail
          case "${{ inputs.action }}" in
            plan)
              terraform -chdir=${{ env.TERRAFORM_DIR }} plan -var-file=vars/prod.tfvars
              ;;
            apply)
              terraform -chdir=${{ env.TERRAFORM_DIR }} plan -var-file=vars/prod.tfvars -out=tfplan
              terraform -chdir=${{ env.TERRAFORM_DIR }} apply -auto-approve tfplan
              ;;
            *)
              echo "::error::Unsupported action '${{ inputs.action }}' for this job."
              exit 1
              ;;
          esac

  terraform-prod-destroy:
    name: Terraform prod (destroy)
    if: inputs.environment == 'prod' && inputs.action == 'destroy'
    needs: [prepare-self-hosted-runner]
    runs-on: [self-hosted, linux, x64, taskapi-cd, vnet]
    environment: prod
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      APP_ENV_VARS_JSON: ${{ vars.TF_APP_ENV_VARS_JSON }}
      RBAC_PROPAGATION_WAIT_SECONDS: "45"
      SHARED_RUNNER_ADMIN_SSH_PUBLIC_KEY: ${{ vars.TF_SHARED_RUNNER_ADMIN_SSH_PUBLIC_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Export Terraform variables
        run: |
          set -euo pipefail
          echo "TF_VAR_rbac_propagation_wait_seconds=${RBAC_PROPAGATION_WAIT_SECONDS}" >> "$GITHUB_ENV"
          if [[ -n "$APP_ENV_VARS_JSON" ]]; then
            echo "TF_VAR_app_env_vars=$APP_ENV_VARS_JSON" >> "$GITHUB_ENV"
          fi

          if [[ -n "$SHARED_RUNNER_ADMIN_SSH_PUBLIC_KEY" ]]; then
            echo "TF_VAR_shared_runner_admin_ssh_public_key=$SHARED_RUNNER_ADMIN_SSH_PUBLIC_KEY" >> "$GITHUB_ENV"
          fi

      - name: Terraform init
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} init -backend-config=backend/prod.hcl -reconfigure

      - name: Terraform destroy (prod)
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} destroy -var-file=vars/prod.tfvars -auto-approve

  cleanup-self-hosted-runner:
    name: Deallocate shared self-hosted runner
    needs: [prepare-self-hosted-runner, terraform-dev, terraform-prod, terraform-prod-destroy]
    if: >-
      ${{
        always() &&
        (
          needs.prepare-self-hosted-runner.result == 'success' ||
          needs.prepare-self-hosted-runner.result == 'failure'
        )
      }}
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Azure login (OIDC, DEV runner control plane)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deallocate shared runner VM
        run: |
          set -euo pipefail

          if ! az vm show \
            --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
            --name "${{ env.SHARED_RUNNER_VM_NAME }}" \
            --query id -o tsv >/dev/null 2>&1; then
            echo "Shared runner VM not found; nothing to deallocate."
            exit 0
          fi

          az vm deallocate \
            --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
            --name "${{ env.SHARED_RUNNER_VM_NAME }}"

      - name: Confirm shared runner VM is deallocated
        run: |
          set -euo pipefail

          if ! az vm show \
            --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
            --name "${{ env.SHARED_RUNNER_VM_NAME }}" \
            --query id -o tsv >/dev/null 2>&1; then
            echo "Shared runner VM no longer exists."
            exit 0
          fi

          power_state="$(az vm get-instance-view \
            --resource-group "${{ env.SHARED_RUNNER_RESOURCE_GROUP }}" \
            --name "${{ env.SHARED_RUNNER_VM_NAME }}" \
            --query "instanceView.statuses[?starts_with(code, 'PowerState/')].code | [0]" \
            -o tsv)"

          if [[ "$power_state" != "PowerState/deallocated" ]]; then
            echo "::error::Expected shared runner VM to be deallocated, got '${power_state}'."
            exit 1
          fi
