name: CD
run-name: CD | env=${{ inputs.environment }} | tf=${{ inputs.action }} | image=${{ inputs.image_tag || 'n/a' }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Terraform action"
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy
      image_tag:
        description: "Immutable image tag from CI (example: sha-abc1234). Required for plan/apply."
        required: false
        type: string

concurrency:
  group: cd-${{ inputs.environment }}-${{ inputs.action }}
  cancel-in-progress: false

env:
  IMAGE_NAME: task-api
  TERRAFORM_DIR: terraform

jobs:
  validate-inputs:
    name: Validate inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate image_tag requirements
        run: |
          set -euo pipefail
          if [[ "${{ inputs.action }}" != "destroy" && -z "${{ inputs.image_tag }}" ]]; then
            echo "::error::image_tag is required for action '${{ inputs.action }}'."
            exit 1
          fi

      - name: Publish CD execution summary
        run: |
          set -euo pipefail
          VAR_FILE="vars/dev.tfvars"
          BACKEND_FILE="backend/dev.hcl"
          if [[ "${{ inputs.environment }}" == "prod" ]]; then
            VAR_FILE="vars/prod.tfvars"
            BACKEND_FILE="backend/prod.hcl"
          fi

          IMAGE_TAG="${{ inputs.image_tag }}"
          if [[ -z "$IMAGE_TAG" ]]; then
            IMAGE_TAG="n/a"
          fi

          echo "## CD Execution Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ inputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Terraform action | \`${{ inputs.action }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag | \`$IMAGE_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend config | \`$BACKEND_FILE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Var file | \`$VAR_FILE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ inputs.environment }}" == "prod" && "${{ inputs.action }}" != "destroy" ]]; then
            echo "This run will promote image by digest from DEV ACR to PROD ACR before Terraform." >> "$GITHUB_STEP_SUMMARY"
          fi

  resolve-prod-source:
    name: Resolve source image in DEV ACR
    if: inputs.environment == 'prod' && inputs.action != 'destroy'
    needs: [validate-inputs]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    outputs:
      source_digest: ${{ steps.resolve.outputs.digest }}
      source_image: ${{ steps.resolve.outputs.source_image }}
    steps:
      - name: Azure login (OIDC, DEV)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve digest from DEV ACR
        id: resolve
        run: |
          set -euo pipefail
          DIGEST=$(az acr manifest show-metadata \
            --registry "${{ vars.ACR_NAME }}" \
            --name "${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}" \
            --query digest -o tsv)

          if [[ -z "$DIGEST" ]]; then
            echo "::error::Image '${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}' was not found in DEV ACR."
            exit 1
          fi

          SOURCE_IMAGE="${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "source_image=$SOURCE_IMAGE" >> "$GITHUB_OUTPUT"

  promote-prod-image:
    name: Promote image to PROD ACR
    if: inputs.environment == 'prod' && inputs.action != 'destroy'
    needs: [resolve-prod-source]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Azure login (OIDC, PROD)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Import image by digest into PROD ACR
        run: |
          set -euo pipefail
          az acr import \
            --name "${{ vars.ACR_NAME }}" \
            --source "${{ needs.resolve-prod-source.outputs.source_image }}" \
            --image "${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}" \
            --force

      - name: Verify promoted digest
        run: |
          set -euo pipefail
          PROD_DIGEST=$(az acr manifest show-metadata \
            --registry "${{ vars.ACR_NAME }}" \
            --name "${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}" \
            --query digest -o tsv)

          if [[ -z "$PROD_DIGEST" ]]; then
            echo "::error::Image '${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}' was not found in PROD ACR."
            exit 1
          fi

          if [[ "$PROD_DIGEST" != "${{ needs.resolve-prod-source.outputs.source_digest }}" ]]; then
            echo "::error::Digest mismatch after promotion. Expected '${{ needs.resolve-prod-source.outputs.source_digest }}', got '$PROD_DIGEST'."
            exit 1
          fi

  terraform-dev:
    name: Terraform dev
    if: inputs.environment == 'dev'
    needs: [validate-inputs]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      APP_ENV_VARS_JSON: ${{ vars.TF_APP_ENV_VARS_JSON }}
      KV_NETWORK_MODE: public_allow
      RBAC_PROPAGATION_WAIT_SECONDS: "45"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Export Terraform variables
        run: |
          set -euo pipefail
          echo "TF_VAR_key_vault_network_mode=${KV_NETWORK_MODE}" >> "$GITHUB_ENV"
          echo "TF_VAR_rbac_propagation_wait_seconds=${RBAC_PROPAGATION_WAIT_SECONDS}" >> "$GITHUB_ENV"

          if [[ "${{ inputs.action }}" != "destroy" ]]; then
            echo "TF_VAR_container_image_tag=${{ inputs.image_tag }}" >> "$GITHUB_ENV"
          fi

          if [[ -n "$APP_ENV_VARS_JSON" ]]; then
            echo "TF_VAR_app_env_vars=$APP_ENV_VARS_JSON" >> "$GITHUB_ENV"
          fi

      - name: Allow runner IP in Key Vault firewall (dev)
        id: kv_firewall_dev
        run: |
          set -euo pipefail

          extract_tfvar_string() {
            local file="$1"
            local key="$2"
            sed -n "s/^[[:space:]]*${key}[[:space:]]*=[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p" "${file}" | head -n 1
          }

          DEV_TFVARS="${{ env.TERRAFORM_DIR }}/vars/dev.tfvars"
          PROJECT_NAME="$(sed -n '/variable "project"/,/}/s/.*default[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p' "${{ env.TERRAFORM_DIR }}/variables.tf" | head -n 1)"
          ENV_NAME="$(extract_tfvar_string "${DEV_TFVARS}" "env")"
          if [[ -z "${ENV_NAME}" ]]; then
            ENV_NAME="dev"
          fi

          KV_NAME="$(extract_tfvar_string "${DEV_TFVARS}" "shared_key_vault_name")"
          if [[ -z "${KV_NAME}" ]]; then
            KV_NAME="$(extract_tfvar_string "${DEV_TFVARS}" "key_vault_name")"
          fi
          if [[ -z "${KV_NAME}" ]]; then
            KV_NAME="${PROJECT_NAME}-${ENV_NAME}-kv-uks"
          fi

          KV_ID="$(az keyvault show --name "${KV_NAME}" --query id -o tsv 2>/dev/null || true)"
          if [[ -z "${KV_ID}" ]]; then
            echo "Key Vault ${KV_NAME} not found yet; skipping firewall bootstrap."
            echo "kv_name=" >> "$GITHUB_OUTPUT"
            echo "kv_rg=" >> "$GITHUB_OUTPUT"
            echo "runner_ip=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KV_DEFAULT_ACTION="$(az keyvault show --name "${KV_NAME}" --query properties.networkAcls.defaultAction -o tsv 2>/dev/null || true)"
          if [[ "${KV_NETWORK_MODE}" != "firewall" && "${KV_DEFAULT_ACTION}" != "Deny" ]]; then
            echo "KV firewall bootstrap not required (mode=${KV_NETWORK_MODE}, defaultAction=${KV_DEFAULT_ACTION:-n/a})."
            echo "kv_name=" >> "$GITHUB_OUTPUT"
            echo "kv_rg=" >> "$GITHUB_OUTPUT"
            echo "runner_ip=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KV_RG="$(printf '%s' "${KV_ID}" | awk -F/ '{for (i=1; i<=NF; i++) if ($i=="resourceGroups") {print $(i+1); exit}}')"
          RUNNER_IP="$(curl -fsS https://api.ipify.org || curl -fsS https://ifconfig.me || true)"

          if [[ -z "${KV_RG}" || -z "${RUNNER_IP}" ]]; then
            echo "::error::Unable to resolve Key Vault resource group or runner IP."
            exit 1
          fi

          az keyvault network-rule add \
            --name "${KV_NAME}" \
            --resource-group "${KV_RG}" \
            --ip-address "${RUNNER_IP}" >/dev/null

          # Keep the same runner IP in Terraform-managed Key Vault firewall during this run.
          echo "TF_VAR_key_vault_allowed_ip_cidrs=[\"${RUNNER_IP}/32\"]" >> "$GITHUB_ENV"
          echo "kv_name=${KV_NAME}" >> "$GITHUB_OUTPUT"
          echo "kv_rg=${KV_RG}" >> "$GITHUB_OUTPUT"
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          echo "Added runner IP ${RUNNER_IP} to Key Vault ${KV_NAME} firewall."

      - name: Terraform init
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} init -backend-config=backend/dev.hcl -reconfigure

      - name: Adopt existing Container App into Terraform state (dev)
        if: inputs.action == 'apply'
        run: |
          set -euo pipefail

          extract_tfvar_string() {
            local file="$1"
            local key="$2"
            sed -n "s/^[[:space:]]*${key}[[:space:]]*=[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p" "${file}" | head -n 1
          }

          DEV_TFVARS="${{ env.TERRAFORM_DIR }}/vars/dev.tfvars"
          PROJECT_NAME="$(sed -n '/variable "project"/,/}/s/.*default[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p' "${{ env.TERRAFORM_DIR }}/variables.tf" | head -n 1)"
          ENV_NAME="$(extract_tfvar_string "${DEV_TFVARS}" "env")"
          if [[ -z "${ENV_NAME}" ]]; then
            ENV_NAME="dev"
          fi

          RG_NAME="${PROJECT_NAME}-${ENV_NAME}-rg-uks"
          APP_NAME="${PROJECT_NAME}-${ENV_NAME}-app"
          APP_ID="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.App/containerApps/${APP_NAME}"

          if terraform -chdir=${{ env.TERRAFORM_DIR }} state show azurerm_container_app.main >/dev/null 2>&1; then
            echo "Container App is already managed in Terraform state."
            exit 0
          fi

          if az resource show --ids "${APP_ID}" >/dev/null 2>&1; then
            echo "Found existing Container App ${APP_NAME}; importing into Terraform state."
            terraform -chdir=${{ env.TERRAFORM_DIR }} import -var-file=vars/dev.tfvars azurerm_container_app.main "${APP_ID}"
          else
            echo "Container App ${APP_NAME} does not exist yet; no import required."
          fi

      - name: Terraform plan/apply/destroy (dev)
        run: |
          set -euo pipefail
          case "${{ inputs.action }}" in
            plan)
              terraform -chdir=${{ env.TERRAFORM_DIR }} plan -var-file=vars/dev.tfvars
              ;;
            apply)
              terraform -chdir=${{ env.TERRAFORM_DIR }} plan -var-file=vars/dev.tfvars -out=tfplan
              terraform -chdir=${{ env.TERRAFORM_DIR }} apply -auto-approve tfplan
              ;;
            destroy)
              terraform -chdir=${{ env.TERRAFORM_DIR }} destroy -var-file=vars/dev.tfvars -auto-approve
              ;;
            *)
              echo "::error::Unsupported action '${{ inputs.action }}'."
              exit 1
              ;;
          esac

      - name: Remove runner IP from Key Vault firewall (dev)
        if: always()
        run: |
          set -euo pipefail
          KV_NAME="${{ steps.kv_firewall_dev.outputs.kv_name }}"
          KV_RG="${{ steps.kv_firewall_dev.outputs.kv_rg }}"
          RUNNER_IP="${{ steps.kv_firewall_dev.outputs.runner_ip }}"

          if [[ -n "${KV_NAME}" && -n "${KV_RG}" && -n "${RUNNER_IP}" ]]; then
            az keyvault network-rule remove \
              --name "${KV_NAME}" \
              --resource-group "${KV_RG}" \
              --ip-address "${RUNNER_IP}" >/dev/null || true
            echo "Removed runner IP ${RUNNER_IP} from Key Vault ${KV_NAME} firewall."
          else
            echo "Skipping Key Vault firewall cleanup because step outputs are empty."
          fi

  terraform-prod:
    name: Terraform prod (plan/apply)
    if: inputs.environment == 'prod' && inputs.action != 'destroy'
    needs: [validate-inputs, promote-prod-image]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      APP_ENV_VARS_JSON: ${{ vars.TF_APP_ENV_VARS_JSON }}
      KV_NETWORK_MODE: public_allow
      RBAC_PROPAGATION_WAIT_SECONDS: "45"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Export Terraform variables
        run: |
          set -euo pipefail
          echo "TF_VAR_key_vault_network_mode=${KV_NETWORK_MODE}" >> "$GITHUB_ENV"
          echo "TF_VAR_rbac_propagation_wait_seconds=${RBAC_PROPAGATION_WAIT_SECONDS}" >> "$GITHUB_ENV"
          echo "TF_VAR_container_image_tag=${{ inputs.image_tag }}" >> "$GITHUB_ENV"

          if [[ -n "$APP_ENV_VARS_JSON" ]]; then
            echo "TF_VAR_app_env_vars=$APP_ENV_VARS_JSON" >> "$GITHUB_ENV"
          fi

      - name: Allow runner IP in Key Vault firewall (prod)
        id: kv_firewall_prod
        run: |
          set -euo pipefail

          extract_tfvar_string() {
            local file="$1"
            local key="$2"
            sed -n "s/^[[:space:]]*${key}[[:space:]]*=[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p" "${file}" | head -n 1
          }

          PROD_TFVARS="${{ env.TERRAFORM_DIR }}/vars/prod.tfvars"
          KV_NAME="$(extract_tfvar_string "${PROD_TFVARS}" "shared_key_vault_name")"
          if [[ -z "${KV_NAME}" ]]; then
            KV_NAME="$(extract_tfvar_string "${PROD_TFVARS}" "key_vault_name")"
          fi
          if [[ -z "${KV_NAME}" ]]; then
            echo "::error::Unable to resolve Key Vault name from vars/prod.tfvars."
            exit 1
          fi

          KV_ID="$(az keyvault show --name "${KV_NAME}" --query id -o tsv 2>/dev/null || true)"
          if [[ -z "${KV_ID}" ]]; then
            echo "Key Vault ${KV_NAME} not found yet; skipping firewall bootstrap."
            echo "kv_name=" >> "$GITHUB_OUTPUT"
            echo "kv_rg=" >> "$GITHUB_OUTPUT"
            echo "runner_ip=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KV_DEFAULT_ACTION="$(az keyvault show --name "${KV_NAME}" --query properties.networkAcls.defaultAction -o tsv 2>/dev/null || true)"
          if [[ "${KV_NETWORK_MODE}" != "firewall" && "${KV_DEFAULT_ACTION}" != "Deny" ]]; then
            echo "KV firewall bootstrap not required (mode=${KV_NETWORK_MODE}, defaultAction=${KV_DEFAULT_ACTION:-n/a})."
            echo "kv_name=" >> "$GITHUB_OUTPUT"
            echo "kv_rg=" >> "$GITHUB_OUTPUT"
            echo "runner_ip=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KV_RG="$(printf '%s' "${KV_ID}" | awk -F/ '{for (i=1; i<=NF; i++) if ($i=="resourceGroups") {print $(i+1); exit}}')"
          RUNNER_IP="$(curl -fsS https://api.ipify.org || curl -fsS https://ifconfig.me || true)"

          if [[ -z "${KV_RG}" || -z "${RUNNER_IP}" ]]; then
            echo "::error::Unable to resolve Key Vault resource group or runner IP."
            exit 1
          fi

          az keyvault network-rule add \
            --name "${KV_NAME}" \
            --resource-group "${KV_RG}" \
            --ip-address "${RUNNER_IP}" >/dev/null

          # Keep the same runner IP in Terraform-managed Key Vault firewall during this run.
          echo "TF_VAR_key_vault_allowed_ip_cidrs=[\"${RUNNER_IP}/32\"]" >> "$GITHUB_ENV"
          echo "kv_name=${KV_NAME}" >> "$GITHUB_OUTPUT"
          echo "kv_rg=${KV_RG}" >> "$GITHUB_OUTPUT"
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          echo "Added runner IP ${RUNNER_IP} to Key Vault ${KV_NAME} firewall."

      - name: Terraform init
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} init -backend-config=backend/prod.hcl -reconfigure

      - name: Adopt existing Container App into Terraform state (prod)
        if: inputs.action == 'apply'
        run: |
          set -euo pipefail

          extract_tfvar_string() {
            local file="$1"
            local key="$2"
            sed -n "s/^[[:space:]]*${key}[[:space:]]*=[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p" "${file}" | head -n 1
          }

          PROD_TFVARS="${{ env.TERRAFORM_DIR }}/vars/prod.tfvars"
          PROJECT_NAME="$(sed -n '/variable "project"/,/}/s/.*default[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p' "${{ env.TERRAFORM_DIR }}/variables.tf" | head -n 1)"
          ENV_NAME="$(extract_tfvar_string "${PROD_TFVARS}" "env")"
          if [[ -z "${ENV_NAME}" ]]; then
            ENV_NAME="prod"
          fi

          RG_NAME="${PROJECT_NAME}-${ENV_NAME}-rg-uks"
          APP_NAME="${PROJECT_NAME}-${ENV_NAME}-app"
          APP_ID="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.App/containerApps/${APP_NAME}"

          if terraform -chdir=${{ env.TERRAFORM_DIR }} state show azurerm_container_app.main >/dev/null 2>&1; then
            echo "Container App is already managed in Terraform state."
            exit 0
          fi

          if az resource show --ids "${APP_ID}" >/dev/null 2>&1; then
            echo "Found existing Container App ${APP_NAME}; importing into Terraform state."
            terraform -chdir=${{ env.TERRAFORM_DIR }} import -var-file=vars/prod.tfvars azurerm_container_app.main "${APP_ID}"
          else
            echo "Container App ${APP_NAME} does not exist yet; no import required."
          fi

      - name: Terraform plan/apply (prod)
        run: |
          set -euo pipefail
          case "${{ inputs.action }}" in
            plan)
              terraform -chdir=${{ env.TERRAFORM_DIR }} plan -var-file=vars/prod.tfvars
              ;;
            apply)
              terraform -chdir=${{ env.TERRAFORM_DIR }} plan -var-file=vars/prod.tfvars -out=tfplan
              terraform -chdir=${{ env.TERRAFORM_DIR }} apply -auto-approve tfplan
              ;;
            *)
              echo "::error::Unsupported action '${{ inputs.action }}' for this job."
              exit 1
              ;;
          esac

      - name: Remove runner IP from Key Vault firewall (prod)
        if: always()
        run: |
          set -euo pipefail
          KV_NAME="${{ steps.kv_firewall_prod.outputs.kv_name }}"
          KV_RG="${{ steps.kv_firewall_prod.outputs.kv_rg }}"
          RUNNER_IP="${{ steps.kv_firewall_prod.outputs.runner_ip }}"

          if [[ -n "${KV_NAME}" && -n "${KV_RG}" && -n "${RUNNER_IP}" ]]; then
            az keyvault network-rule remove \
              --name "${KV_NAME}" \
              --resource-group "${KV_RG}" \
              --ip-address "${RUNNER_IP}" >/dev/null || true
            echo "Removed runner IP ${RUNNER_IP} from Key Vault ${KV_NAME} firewall."
          else
            echo "Skipping Key Vault firewall cleanup because step outputs are empty."
          fi

  terraform-prod-destroy:
    name: Terraform prod (destroy)
    if: inputs.environment == 'prod' && inputs.action == 'destroy'
    needs: [validate-inputs]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      APP_ENV_VARS_JSON: ${{ vars.TF_APP_ENV_VARS_JSON }}
      KV_NETWORK_MODE: public_allow
      RBAC_PROPAGATION_WAIT_SECONDS: "45"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Export Terraform variables
        run: |
          set -euo pipefail
          echo "TF_VAR_key_vault_network_mode=${KV_NETWORK_MODE}" >> "$GITHUB_ENV"
          echo "TF_VAR_rbac_propagation_wait_seconds=${RBAC_PROPAGATION_WAIT_SECONDS}" >> "$GITHUB_ENV"
          if [[ -n "$APP_ENV_VARS_JSON" ]]; then
            echo "TF_VAR_app_env_vars=$APP_ENV_VARS_JSON" >> "$GITHUB_ENV"
          fi

      - name: Allow runner IP in Key Vault firewall (prod destroy)
        id: kv_firewall_prod_destroy
        run: |
          set -euo pipefail

          extract_tfvar_string() {
            local file="$1"
            local key="$2"
            sed -n "s/^[[:space:]]*${key}[[:space:]]*=[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p" "${file}" | head -n 1
          }

          PROD_TFVARS="${{ env.TERRAFORM_DIR }}/vars/prod.tfvars"
          KV_NAME="$(extract_tfvar_string "${PROD_TFVARS}" "shared_key_vault_name")"
          if [[ -z "${KV_NAME}" ]]; then
            KV_NAME="$(extract_tfvar_string "${PROD_TFVARS}" "key_vault_name")"
          fi
          if [[ -z "${KV_NAME}" ]]; then
            echo "::error::Unable to resolve Key Vault name from vars/prod.tfvars."
            exit 1
          fi

          KV_ID="$(az keyvault show --name "${KV_NAME}" --query id -o tsv 2>/dev/null || true)"
          if [[ -z "${KV_ID}" ]]; then
            echo "Key Vault ${KV_NAME} not found yet; skipping firewall bootstrap."
            echo "kv_name=" >> "$GITHUB_OUTPUT"
            echo "kv_rg=" >> "$GITHUB_OUTPUT"
            echo "runner_ip=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KV_DEFAULT_ACTION="$(az keyvault show --name "${KV_NAME}" --query properties.networkAcls.defaultAction -o tsv 2>/dev/null || true)"
          if [[ "${KV_NETWORK_MODE}" != "firewall" && "${KV_DEFAULT_ACTION}" != "Deny" ]]; then
            echo "KV firewall bootstrap not required (mode=${KV_NETWORK_MODE}, defaultAction=${KV_DEFAULT_ACTION:-n/a})."
            echo "kv_name=" >> "$GITHUB_OUTPUT"
            echo "kv_rg=" >> "$GITHUB_OUTPUT"
            echo "runner_ip=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KV_RG="$(printf '%s' "${KV_ID}" | awk -F/ '{for (i=1; i<=NF; i++) if ($i=="resourceGroups") {print $(i+1); exit}}')"
          RUNNER_IP="$(curl -fsS https://api.ipify.org || curl -fsS https://ifconfig.me || true)"

          if [[ -z "${KV_RG}" || -z "${RUNNER_IP}" ]]; then
            echo "::error::Unable to resolve Key Vault resource group or runner IP."
            exit 1
          fi

          az keyvault network-rule add \
            --name "${KV_NAME}" \
            --resource-group "${KV_RG}" \
            --ip-address "${RUNNER_IP}" >/dev/null

          # Keep the same runner IP in Terraform-managed Key Vault firewall during this run.
          echo "TF_VAR_key_vault_allowed_ip_cidrs=[\"${RUNNER_IP}/32\"]" >> "$GITHUB_ENV"
          echo "kv_name=${KV_NAME}" >> "$GITHUB_OUTPUT"
          echo "kv_rg=${KV_RG}" >> "$GITHUB_OUTPUT"
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          echo "Added runner IP ${RUNNER_IP} to Key Vault ${KV_NAME} firewall."

      - name: Terraform init
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} init -backend-config=backend/prod.hcl -reconfigure

      - name: Terraform destroy (prod)
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} destroy -var-file=vars/prod.tfvars -auto-approve

      - name: Remove runner IP from Key Vault firewall (prod destroy)
        if: always()
        run: |
          set -euo pipefail
          KV_NAME="${{ steps.kv_firewall_prod_destroy.outputs.kv_name }}"
          KV_RG="${{ steps.kv_firewall_prod_destroy.outputs.kv_rg }}"
          RUNNER_IP="${{ steps.kv_firewall_prod_destroy.outputs.runner_ip }}"

          if [[ -n "${KV_NAME}" && -n "${KV_RG}" && -n "${RUNNER_IP}" ]]; then
            az keyvault network-rule remove \
              --name "${KV_NAME}" \
              --resource-group "${KV_RG}" \
              --ip-address "${RUNNER_IP}" >/dev/null || true
            echo "Removed runner IP ${RUNNER_IP} from Key Vault ${KV_NAME} firewall."
          else
            echo "Skipping Key Vault firewall cleanup because step outputs are empty."
          fi
