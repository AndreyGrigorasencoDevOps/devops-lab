name: Container CI (Build & Push)

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"

concurrency:
  group: container-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SMOKE_PORT: 3000
  SMOKE_CONTAINER_PORT: 3000
  SMOKE_HEALTH_PATH: /health

jobs:
  security:
    name: Security (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.26.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          format: 'table'

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@0.26.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          format: 'table'

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (load only, for smoke)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: local/smoke:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (curl /health with retry)
        run: |
          cid=$(docker run -d -p "$SMOKE_PORT:$SMOKE_CONTAINER_PORT" local/smoke:test)
          trap 'docker rm -f "$cid" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -fsS --max-time 2 "http://127.0.0.1:$SMOKE_PORT$SMOKE_HEALTH_PATH"; then
              echo ""
              echo "Health check passed."
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 2s..."
            sleep 2
          done
          echo "Health check failed after 30 attempts."
          echo "--- docker ps -a ---"
          docker ps -a
          echo "--- docker logs $cid ---"
          docker logs "$cid"
          exit 1

  publish:
    name: Publish image
    runs-on: ubuntu-latest
    needs: [security, smoke]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=prod,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max