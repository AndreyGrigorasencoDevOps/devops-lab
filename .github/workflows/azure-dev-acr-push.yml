name: Build & Push image to ACR (dev)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: task-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "login_server=${{ vars.ACR_LOGIN_SERVER }}" >> "$GITHUB_OUTPUT"

      - name: Login to ACR (token via Azure)
        run: |
          az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.login_server }}/${{ env.IMAGE_NAME }}:dev" \
            -t "${{ steps.meta.outputs.login_server }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}" \
            .

      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.login_server }}/${{ env.IMAGE_NAME }}:dev"
          docker push "${{ steps.meta.outputs.login_server }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}"
