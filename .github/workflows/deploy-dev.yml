name: Deploy to Dev

on:
  workflow_run:
    workflows: ["Image Build & Push"]
    types: [completed]
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: task-api

jobs:
  deploy:
    name: Deploy to dev
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA="${{ github.event.workflow_run.head_sha }}"
          echo "image=${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${SHORT_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Update Container App
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --image "${{ steps.meta.outputs.image }}"

          echo "Listing revisions:"
          az containerapp revision list \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --query "[].{name:name, active:properties.active, traffic:properties.trafficWeight, image:properties.template.containers[0].image}" \
            -o table

      - name: Validate active revision
        run: |
          ACTIVE_IMAGE=$(az containerapp revision list \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --query "sort_by([?properties.trafficWeight!=null && properties.trafficWeight>\`0\`], &properties.trafficWeight)[-1].properties.template.containers[0].image" \
            -o tsv)

          echo "Active image by traffic: $ACTIVE_IMAGE"

          if [ -z "$ACTIVE_IMAGE" ]; then
            echo "ERROR: Could not determine active image."
            exit 1
          fi

      - name: Validate /health
        run: |
          FQDN=$(az containerapp show \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "FQDN=$FQDN"
          curl -fsS "https://$FQDN/health"
