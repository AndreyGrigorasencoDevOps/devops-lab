name: CI

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  IMAGE_NAME: task-api
  SMOKE_PORT: 3000
  SMOKE_CONTAINER_PORT: 3000
  SMOKE_HEALTH_PATH: /health

jobs:
  pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check semantic PR title
        uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            ci
            chore
            refactor
            test
            build
            perf
            revert
          requireScope: false

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  automation-lint:
    name: Automation lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.8"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          /tmp/actionlint -version

      - name: Run actionlint
        run: /tmp/actionlint

      - name: Run shellcheck
        run: shellcheck -x scripts/*.sh

  quality:
    name: Quality (Node 24)
    runs-on: ubuntu-latest
    env:
      HAS_SONAR_TOKEN: ${{ secrets.SONAR_TOKEN != '' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report-node24
          path: coverage/lcov.info

      - name: Sonar scan
        if: ${{ env.HAS_SONAR_TOKEN == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT }}
            -Dsonar.organization=${{ vars.SONAR_ORG }}
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Security audit (prod deps)
        run: npm audit --omit=dev --audit-level=high

  trivy:
    name: Trivy scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.33.1
        with:
          version: latest
          scan-type: fs
          scan-ref: .
          cache: "false"
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.33.1
        with:
          version: latest
          scan-type: config
          scan-ref: .
          cache: "false"
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table

  smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d taskdb"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: local/smoke:node24
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (/health)
        run: |
          cid=$(docker run -d \
            -p "$SMOKE_PORT:$SMOKE_CONTAINER_PORT" \
            --add-host=host.docker.internal:host-gateway \
            -e NODE_ENV=production \
            -e DB_HOST=host.docker.internal \
            -e DB_PORT=5432 \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            -e DB_NAME=taskdb \
            local/smoke:node24)
          trap 'docker rm -f "$cid" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -fsS --max-time 2 "http://127.0.0.1:$SMOKE_PORT$SMOKE_HEALTH_PATH"; then
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 2s..."
            sleep 2
          done
          echo "--- docker ps -a ---"
          docker ps -a
          echo "--- docker logs $cid ---"
          docker logs "$cid"
          exit 1

  ci-summary:
    name: CI summary
    if: always()
    needs: [pr-title, dependency-review, automation-lint, quality, trivy, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PR_SOURCE_BRANCH: ${{ github.head_ref }}
    steps:
      - name: Publish PR CI summary
        run: |
          {
            echo "## CI (PR) Execution Summary"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Event | \`${{ github.event_name }}\` |"
            echo "| PR | \`#${{ github.event.pull_request.number }}\` |"
            echo "| Source branch | \`${PR_SOURCE_BRANCH}\` |"
            echo "| PR title check | \`${{ needs.pr-title.result }}\` |"
            echo "| Dependency review | \`${{ needs.dependency-review.result }}\` |"
            echo "| Automation lint | \`${{ needs.automation-lint.result }}\` |"
            echo "| Quality (lint/test/sonar/audit) | \`${{ needs.quality.result }}\` |"
            echo "| Trivy | \`${{ needs.trivy.result }}\` |"
            echo "| Docker smoke | \`${{ needs.smoke.result }}\` |"
            echo ""
            echo "Quality runs on Node 24."
            echo "Docker smoke validates the default \`node:24-alpine\` image."
            echo ""
            echo "Sonar scan runs when \`SONAR_TOKEN\` exists and PR is from this repository."
          } >> "$GITHUB_STEP_SUMMARY"
