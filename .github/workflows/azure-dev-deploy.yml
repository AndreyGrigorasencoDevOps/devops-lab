name: CI Azure Deployment (dev)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: task-api

jobs:
  verify:
    name: Verify Azure context
    runs-on: ubuntu-latest

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Azure account context
        run: |
          az account show --output table
          az group show --name "${{ vars.AZURE_RG }}" --output table
          az acr show --name "${{ vars.ACR_NAME }}" --output table
          az containerapp show \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --query "{fqdn:properties.configuration.ingress.fqdn, revision:properties.latestRevisionName, state:properties.provisioningState}" \
            -o json

  build-push-deploy:
    name: Build, push & deploy
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "image_dev=${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:dev" >> "$GITHUB_OUTPUT"
          echo "image_sha=${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Login to ACR (token via Azure)
        run: |
          az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.image_dev }}" \
            -t "${{ steps.meta.outputs.image_sha }}" \
            .

      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.image_dev }}"
          docker push "${{ steps.meta.outputs.image_sha }}"

      # ---- Make Container App pull from ACR without secrets ----
      - name: Ensure Container App has system-assigned identity
        id: appid
        run: |
          PRINCIPAL_ID=$(az containerapp identity assign \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --system-assigned \
            --query principalId -o tsv)
          echo "principal_id=$PRINCIPAL_ID" >> "$GITHUB_OUTPUT"

      - name: Grant AcrPull to Container App identity (idempotent)
        run: |
          ACR_ID=$(az acr show --name "${{ vars.ACR_NAME }}" --query id -o tsv)

          OUTPUT=$(az role assignment create \
            --assignee-object-id "${{ steps.appid.outputs.principal_id }}" \
            --assignee-principal-type ServicePrincipal \
            --role AcrPull \
            --scope "$ACR_ID" 2>&1) || {
            if echo "$OUTPUT" | grep -qi "conflict\|already exists"; then
              echo "Role assignment already exists — skipping."
            else
              echo "$OUTPUT" >&2
              exit 1
            fi
          }

      - name: Configure Container App registry to use Managed Identity
        run: |
          az containerapp registry set \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --server "${{ vars.ACR_LOGIN_SERVER }}" \
            --identity system

      # ---- Deploy ----
      - name: Update Container App to new image (shortsha)
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --image "${{ steps.meta.outputs.image_sha }}"

          echo "Listing revisions (name, active, trafficWeight, image):"
          az containerapp revision list \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --query "[].{name:name, active:properties.active, traffic:properties.trafficWeight, image:properties.template.containers[0].image}" \
            -o table

      # ---- Validate ----
      - name: Validate active revision is running the expected image
        run: |
          ACTIVE_IMAGE=$(az containerapp revision list \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --query "sort_by([?properties.trafficWeight!=null && properties.trafficWeight>\`0\`], &properties.trafficWeight)[-1].properties.template.containers[0].image" \
            -o tsv)

          echo "Active image by traffic: $ACTIVE_IMAGE"

          if [ -z "$ACTIVE_IMAGE" ]; then
            echo "ERROR: Could not determine active image (trafficWeight>0)."
            exit 1
          fi

      - name: Validate /health returns 200
        run: |
          FQDN=$(az containerapp show \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "FQDN=$FQDN"
          curl -fsS "https://$FQDN/health"
