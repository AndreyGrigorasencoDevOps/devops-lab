name: Promote & Deploy to Prod

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "SHA tag to promote (e.g. sha-abc1234). Defaults to HEAD."
        required: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IMAGE_NAME: task-api

jobs:
  promote:
    name: Promote image to PROD ACR
    runs-on: ubuntu-latest
    outputs:
      prod_image: ${{ steps.verify.outputs.prod_image }}

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve source image tag
        id: source
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.image_tag }}" ]; then
            SOURCE_TAG="${{ inputs.image_tag }}"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            SOURCE_TAG="sha-${SHORT_SHA}"
          fi
          echo "tag=$SOURCE_TAG" >> "$GITHUB_OUTPUT"
          echo "Source tag: $SOURCE_TAG"

      - name: Resolve version tag
        id: version
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ steps.source.outputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version tag: $TAG"

      - name: Resolve ACR login servers
        id: acr
        run: |
          set -euo pipefail
          DEV_LOGIN_SERVER=$(az acr show -n "${{ vars.DEV_ACR_NAME }}" --query loginServer -o tsv)
          PROD_LOGIN_SERVER=$(az acr show -n "${{ vars.PROD_ACR_NAME }}" --query loginServer -o tsv)
          echo "dev_server=$DEV_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "prod_server=$PROD_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "DEV ACR: $DEV_LOGIN_SERVER"
          echo "PROD ACR: $PROD_LOGIN_SERVER"

      - name: Resolve digest from DEV ACR
        id: digest
        run: |
          set -euo pipefail
          TAG="${{ steps.source.outputs.tag }}"
          echo "Looking up ${{ vars.DEV_ACR_NAME }}/${{ env.IMAGE_NAME }}:$TAG"

          DIGEST=$(az acr manifest show-metadata \
            --name "${{ vars.DEV_ACR_NAME }}" \
            --image "${{ env.IMAGE_NAME }}:$TAG" \
            --query digest -o tsv) || {
            echo "::error::Image ${{ env.IMAGE_NAME }}:$TAG not found in DEV ACR."
            echo "Ensure this commit was deployed to dev first (push to main triggers the build)."
            exit 1
          }

          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Source digest: $DIGEST"

      - name: Import image by digest from DEV ACR to PROD ACR
        id: import
        run: |
          set -euo pipefail
          SOURCE="${{ steps.acr.outputs.dev_server }}/${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}"
          VERSION_TAG="${{ steps.version.outputs.tag }}"

          echo "Importing $SOURCE -> ${{ vars.PROD_ACR_NAME }}"
          az acr import \
            --name "${{ vars.PROD_ACR_NAME }}" \
            --source "$SOURCE" \
            --image "${{ env.IMAGE_NAME }}:${VERSION_TAG}" \
            --image "${{ env.IMAGE_NAME }}:latest" \
            --force

      - name: Verify imported tag in PROD ACR
        id: verify
        run: |
          set -euo pipefail
          VERSION_TAG="${{ steps.version.outputs.tag }}"
          SOURCE_DIGEST="${{ steps.digest.outputs.digest }}"
          PROD_DIGEST=$(az acr manifest show-metadata \
            --name "${{ vars.PROD_ACR_NAME }}" \
            --image "${{ env.IMAGE_NAME }}:${VERSION_TAG}" \
            --query digest -o tsv)

          if [ -z "$PROD_DIGEST" ]; then
            echo "::error::Image ${{ env.IMAGE_NAME }}:${VERSION_TAG} was not found in PROD ACR after import."
            exit 1
          fi

          if [ "$PROD_DIGEST" != "$SOURCE_DIGEST" ]; then
            echo "::error::Digest mismatch. Expected $SOURCE_DIGEST, got $PROD_DIGEST"
            exit 1
          fi

          PROD_IMAGE="${{ steps.acr.outputs.prod_server }}/${{ env.IMAGE_NAME }}@${PROD_DIGEST}"
          echo "prod_image=$PROD_IMAGE" >> "$GITHUB_OUTPUT"
          echo "PROD digest for tag ${VERSION_TAG}: $PROD_DIGEST"
          echo "Promoted: $PROD_IMAGE (tag: $VERSION_TAG)"

  deploy:
    name: Deploy to prod
    needs: promote
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App
        run: |
          set -euo pipefail
          echo "Deploying image: ${{ needs.promote.outputs.prod_image }}"

          az containerapp update \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --image "${{ needs.promote.outputs.prod_image }}"

          echo "Listing revisions:"
          az containerapp revision list \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --query "[].{name:name, active:properties.active, traffic:properties.trafficWeight, image:properties.template.containers[0].image}" \
            -o table

      - name: Validate active revision
        run: |
          set -euo pipefail
          ACTIVE_IMAGE=$(az containerapp revision list \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --query "sort_by([?properties.trafficWeight!=null && properties.trafficWeight>\`0\`], &properties.trafficWeight)[-1].properties.template.containers[0].image" \
            -o tsv)

          echo "Active image by traffic: $ACTIVE_IMAGE"

          if [ -z "$ACTIVE_IMAGE" ]; then
            echo "ERROR: Could not determine active image."
            exit 1
          fi

      - name: Validate /health
        run: |
          set -euo pipefail
          FQDN=$(az containerapp show \
            --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "FQDN=$FQDN"
          curl -fsS "https://$FQDN/health"
